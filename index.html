<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🏆 The Prize-Giving Day Game</title>
    <style>
        :root {
            --primary: #FF6B6B;
            --secondary: #4ECDC4;
            --accent: #FFE66D;
            --dark: #292F36;
            --light: #F7FFF7;
        }

        body {
            font-family: 'Comic Sans MS', 'Chalkboard SE', sans-serif;
            background-color: #87CEEB;
            background-image: radial-gradient(#ffffff 20%, transparent 20%), radial-gradient(#ffffff 20%, transparent 20%);
            background-size: 50px 50px;
            background-position: 0 0, 25px 25px;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: var(--dark);
        }

        .game-container {
            background: white;
            width: 90%;
            max-width: 600px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            padding: 20px;
            text-align: center;
            position: relative;
            overflow: hidden;
            border: 5px solid var(--secondary);
        }

        h1 {
            color: var(--primary);
            margin-bottom: 5px;
        }

        .level-indicator {
            font-size: 1.2em;
            font-weight: bold;
            color: var(--secondary);
            margin-bottom: 15px;
            background: #e0f7fa;
            padding: 5px 15px;
            border-radius: 20px;
            display: inline-block;
        }

        .question-box {
            background: #fff9c4;
            padding: 15px;
            border-radius: 15px;
            margin: 15px 0;
            font-size: 1.1em;
            border: 2px dashed #fbc02d;
        }

        .options {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 15px;
        }

        button {
            background: var(--secondary);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 50px;
            font-size: 1.1em;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.1s;
            box-shadow: 0 4px #2a9d8f;
        }

        button:active {
            transform: translateY(4px);
            box-shadow: none;
        }

        button.correct {
            background: #4caf50;
            box-shadow: 0 4px #388e3c;
        }

        button.wrong {
            background: #f44336;
            box-shadow: 0 4px #d32f2f;
        }

        .match-area {
            display: flex;
            justify-content: space-around;
            gap: 10px;
        }

        .column {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .card {
            background: white;
            border: 2px solid #ccc;
            padding: 10px;
            border-radius: 10px;
            cursor: pointer;
            user-select: none;
            transition: background 0.3s;
        }

        .card.selected {
            background: var(--accent);
            border-color: #fbc02d;
        }

        .card.matched {
            background: #c8e6c9;
            border-color: #4caf50;
            color: #2e7d32;
            pointer-events: none;
        }

        .progress-bar {
            width: 100%;
            height: 15px;
            background: #eee;
            border-radius: 10px;
            margin-top: 20px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: var(--primary);
            width: 0%;
            transition: width 0.5s;
        }

        .feedback {
            margin-top: 10px;
            font-weight: bold;
            height: 20px;
        }

        .start-screen, .end-screen {
            padding: 20px;
        }

        .hidden { display: none; }
        
        .confetti {
            position: absolute;
            width: 10px;
            height: 10px;
            background-color: #f00;
            animation: fall 3s linear forwards;
        }

        @keyframes fall {
            to { transform: translateY(100vh) rotate(720deg); }
        }
    </style>
</head>
<body>

<div class="game-container">
    <!-- Start Screen -->
    <div id="startScreen" class="start-screen">
        <h1>🏆 The Prize-Giving Day</h1>
        <p>Помоги восстановить историю о награждении!</p>
        <p><i>Irregular Plurals + Some/Any + Was/Were</i></p>
        <button onclick="startGame()">Начать игру 🚀</button>
    </div>

    <!-- Game Screen -->
    <div id="gameScreen" class="hidden">
        <div class="level-indicator" id="levelText">Level 1</div>
        <div id="gameContent"></div>
        <div class="feedback" id="feedbackText"></div>
        <div class="progress-bar">
            <div class="progress-fill" id="progressFill"></div>
        </div>
    </div>

    <!-- End Screen -->
    <div id="endScreen" class="end-screen hidden">
        <h1>🎉 Great Job!</h1>
        <p>Ты отлично справился с заданием!</p>
        <p id="finalScore"></p>
        <button onclick="location.reload()">Играть снова 🔄</button>
    </div>
</div>

<script>
    // Game Data
    const levels = [
        {
            type: 'match',
            title: '🔤 Level 1: Irregular Plurals',
            desc: 'Соедини единственное число с множественным',
            pairs: [
                { left: 'man', right: 'men', emojiL: '👨', emojiR: '👨👨' },
                { left: 'woman', right: 'women', emojiL: '👩', emojiR: '👩👩' },
                { left: 'child', right: 'children', emojiL: '🧒', emojiR: '🧒🧒' }
            ]
        },
        {
            type: 'choice',
            title: '🔍 Level 2: Some or Any?',
            desc: 'Выбери правильное слово',
            questions: [
                { text: "There weren't ___ children in the classroom.", answer: "any", options: ["some", "any"], hint: "Отрицание (-)" },
                { text: "There were ___ teachers.", answer: "some", options: ["some", "any"], hint: "Утверждение (+)" },
                { text: "Were there ___ parents?", answer: "any", options: ["some", "any"], hint: "Вопрос (?)" }
            ]
        },
        {
            type: 'choice',
            title: '🏫 Level 3: Was or Were?',
            desc: 'Выбери правильный глагол',
            questions: [
                { text: "It ___ the school prize-giving.", answer: "was", options: ["was", "were"], hint: "It = 1" },
                { text: "We ___ late.", answer: "were", options: ["was", "were"], hint: "We = много" },
                { text: "There ___ a prize for English.", answer: "was", options: ["was", "were"], hint: "A prize = 1" }
            ]
        },
        {
            type: 'fill',
            title: ' Level 4: Restore the Story!',
            desc: 'Заполни пропуски в тексте',
            sentences: [
                { pre: "There", blank: "weren't", post: "any children in the classroom.", options: ["wasn't", "weren't"] },
                { pre: "The prize-giving", blank: "was", post: "in the playground.", options: ["was", "were"] },
                { pre: "We", blank: "were", post: "the winners!", options: ["was", "were"] }
            ]
        }
    ];

    let currentLevelIdx = 0;
    let score = 0;
    let totalQuestions = 0;
    let selectedMatch = null;

    function startGame() {
        document.getElementById('startScreen').classList.add('hidden');
        document.getElementById('gameScreen').classList.remove('hidden');
        currentLevelIdx = 0;
        score = 0;
        loadLevel();
    }

    function loadLevel() {
        if (currentLevelIdx >= levels.length) {
            endGame();
            return;
        }

        const level = levels[currentLevelIdx];
        const content = document.getElementById('gameContent');
        document.getElementById('levelText').textContent = level.title;
        document.getElementById('feedbackText').textContent = level.desc;
        updateProgress();

        content.innerHTML = '';

        if (level.type === 'match') {
            renderMatchLevel(level, content);
        } else if (level.type === 'choice') {
            renderChoiceLevel(level, content);
        } else if (level.type === 'fill') {
            renderFillLevel(level, content);
        }
    }

    function renderMatchLevel(level, container) {
        const area = document.createElement('div');
        area.className = 'match-area';
        const col1 = document.createElement('div');
        col1.className = 'column';
        const col2 = document.createElement('div');
        col2.className = 'column';

        // Shuffle right column
        const shuffledPairs = [...level.pairs].sort(() => Math.random() - 0.5);

        level.pairs.forEach(p => {
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `${p.emojiL} <b>${p.left}</b>`;
            card.onclick = () => selectLeftCard(card, p.left, p.right);
            col1.appendChild(card);
        });

        shuffledPairs.forEach(p => {
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `${p.emojiR} <b>${p.right}</b>`;
            card.onclick = () => selectRightCard(card, p.right);
            col2.appendChild(card);
        });

        area.appendChild(col1);
        area.appendChild(col2);
        container.appendChild(area);
    }

    function selectLeftCard(card, left, right) {
        document.querySelectorAll('.column:first-child .card').forEach(c => c.classList.remove('selected'));
        card.classList.add('selected');
        selectedMatch = { card, left, right };
    }

    function selectRightCard(card, rightVal) {
        if (!selectedMatch) return;
        
        if (selectedMatch.right === rightVal) {
            card.classList.add('matched');
            selectedMatch.card.classList.add('matched');
            selectedMatch = null;
            feedback("Correct! ✅", true);
            score++;
            checkMatchCompletion();
        } else {
            card.classList.add('wrong');
            setTimeout(() => card.classList.remove('wrong'), 500);
            feedback("Try again! ❌", false);
        }
    }

    let matchedCount = 0;
    function checkMatchCompletion() {
        matchedCount++;
        if (matchedCount === levels[currentLevelIdx].pairs.length) {
            matchedCount = 0;
            setTimeout(nextLevel, 1000);
        }
    }

    function renderChoiceLevel(level, container) {
        let qIndex = 0;
        function showNextQ() {
            if (qIndex >= level.questions.length) {
                nextLevel();
                return;
            }
            const q = level.questions[qIndex];
            const wrapper = document.createElement('div');
            wrapper.className = 'question-box';
            
            const textSpan = document.createElement('span');
            // Simple bolding of the answer slot
            const parts = q.text.split('___');
            textSpan.innerHTML = `${parts[0]} <span style="color:var(--primary)">___</span> ${parts[1] || ''}`;
            
            const opts = document.createElement('div');
            opts.className = 'options';
            
            q.options.forEach(opt => {
                const btn = document.createElement('button');
                btn.textContent = opt;
                btn.onclick = () => {
                    if (opt === q.answer) {
                        btn.classList.add('correct');
                        feedback(`Correct! (${q.hint}) ✅`, true);
                        score++;
                        totalQuestions++;
                        setTimeout(() => {
                            wrapper.remove();
                            qIndex++;
                            showNextQ();
                        }, 800);
                    } else {
                        btn.classList.add('wrong');
                        feedback(`Oops! Hint: ${q.hint} ❌`, false);
                    }
                };
                opts.appendChild(btn);
            });
            
            wrapper.appendChild(textSpan);
            wrapper.appendChild(opts);
            container.appendChild(wrapper);
        }
        showNextQ();
    }

    function renderFillLevel(level, container) {
        let sIndex = 0;
        function showNextS() {
            if (sIndex >= level.sentences.length) {
                nextLevel();
                return;
            }
            const s = level.sentences[sIndex];
            const wrapper = document.createElement('div');
            wrapper.className = 'question-box';
            wrapper.innerHTML = `${s.pre} <b style="color:var(--primary)">___</b> ${s.post}`;
            
            const opts = document.createElement('div');
            opts.className = 'options';
            
            s.options.forEach(opt => {
                const btn = document.createElement('button');
                btn.textContent = opt;
                btn.onclick = () => {
                    if (opt === s.blank) {
                        btn.classList.add('correct');
                        wrapper.innerHTML = `${s.pre} <b style="color:green">${opt}</b> ${s.post} ✅`;
                        feedback("Great! ✅", true);
                        score++;
                        setTimeout(() => {
                            wrapper.remove();
                            sIndex++;
                            showNextS();
                        }, 1000);
                    } else {
                        btn.classList.add('wrong');
                        feedback("Try again! ❌", false);
                    }
                };
                opts.appendChild(btn);
            });
            
            wrapper.appendChild(opts);
            container.appendChild(wrapper);
        }
        showNextS();
    }

    function feedback(msg, isCorrect) {
        const el = document.getElementById('feedbackText');
        el.textContent = msg;
        el.style.color = isCorrect ? 'green' : 'red';
    }

    function nextLevel() {
        currentLevelIdx++;
        if (currentLevelIdx < levels.length) {
            loadLevel();
        } else {
            endGame();
        }
    }

    function updateProgress() {
        const pct = ((currentLevelIdx) / levels.length) * 100;
        document.getElementById('progressFill').style.width = pct + '%';
    }

    function endGame() {
        document.getElementById('gameScreen').classList.add('hidden');
        document.getElementById('endScreen').classList.remove('hidden');
        document.getElementById('progressFill').style.width = '100%';
        
        // Calculate stars
        const maxScore = levels[0].pairs.length + levels[1].questions.length + levels[2].questions.length + levels[3].sentences.length;
        let stars = score >= maxScore - 2 ? '⭐⭐⭐⭐⭐' : (score >= maxScore / 2 ? '⭐⭐⭐' : '⭐');
        
        document.getElementById('finalScore').innerHTML = `Ты набрал ${score} очков!<br>${stars}`;
        createConfetti();
    }

    function createConfetti() {
        for(let i=0; i<50; i++) {
            const c = document.createElement('div');
            c.className = 'confetti';
            c.style.left = Math.random() * 100 + '%';
            c.style.backgroundColor = ['#ff0', '#f00', '#0f0', '#00f'][Math.floor(Math.random()*4)];
            c.style.animationDuration = (Math.random() * 2 + 1) + 's';
            document.body.appendChild(c);
            setTimeout(() => c.remove(), 3000);
        }
    }
</script>

</body>
</html>
